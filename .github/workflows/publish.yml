name: Publish site

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22.23.1
          cache: pnpm

      - uses: pandoc/actions/setup@v1
        with:
          version: 3.9.0.2

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

      - name: Build the site and EPUBs
        env:
          STORIES_BASE_PATH: /stories/
          STORIES_SITE_BASE_PATH: /stories/
          STORIES_SITE_ORIGIN: https://michael-f-bryan.github.io
        run: pnpm build

      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
